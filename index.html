<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Grupo VIP de Ofertas</title>

<style>

body{
margin:0;
font-family:Arial;
background:radial-gradient(circle,#020617,#000);
color:white;
text-align:center;
padding:20px;
}

.container{
max-width:400px;
margin:auto;
}

.card{
background:linear-gradient(145deg,#020617,#0f172a);
padding:25px;
border-radius:20px;
box-shadow:0 0 40px rgba(0,255,100,0.1);
}

h1{
font-size:26px;
}

.vip{
color:#22c55e;
}

.subtitle{
color:#cbd5e1;
font-size:14px;
margin-bottom:15px;
}

.alert{
background:#dc2626;
padding:8px;
border-radius:10px;
font-size:13px;
margin-bottom:10px;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{opacity:1}
50%{opacity:0.5}
100%{opacity:1}
}

.timer{
font-size:20px;
margin:10px 0;
color:#facc15;
}

.benefits{
text-align:left;
margin:20px 0;
}

.benefits p{
margin:10px 0;
}

button{
width:100%;
padding:18px;
border:none;
border-radius:50px;
font-size:18px;
font-weight:bold;
background:linear-gradient(135deg,#22c55e,#16a34a);
color:white;
cursor:pointer;
animation:glow 1.5s infinite;
}

@keyframes glow{
0%{box-shadow:0 0 10px #22c55e}
50%{box-shadow:0 0 25px #22c55e}
100%{box-shadow:0 0 10px #22c55e}
}

.prova{
margin-top:15px;
font-size:13px;
color:#94a3b8;
}

.contador{
font-size:26px;
color:#22c55e;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<div class="alert">
🚨 ÚLTIMAS VAGAS DISPONÍVEIS
</div>

<h1>Grupo <span class="vip">VIP</span> de Ofertas</h1>

<p class="subtitle">
Até <b>80% OFF</b> direto no seu WhatsApp todos os dias
</p>

<div class="timer" id="timer">
⏳ Carregando...
</div>

<div class="benefits">

<p>⚡ Ofertas antes de todo mundo</p>
<p>🎟️ Cupons secretos</p>
<p>💰 Preços absurdamente baixos</p>
<p>🚚 Frete grátis diário</p>

</div>

<button onclick="entrar()">
🔥 ENTRAR NO GRUPO AGORA
</button>

<div class="prova">
<div class="contador" id="contador">+437</div>
pessoas já entraram hoje
</div>

</div>

</div>

<script>

// 🔗 COLOCA SEU LINK AQUI
const linkGrupo = "https://chat.whatsapp.com/EeGCo14giB34USFNg5bbmb?mode=gi_t"

// REDIRECIONA
function entrar(){
window.open(linkGrupo)
}

// CONTADOR DINÂMICO
let pessoas = 437
setInterval(()=>{
pessoas += Math.floor(Math.random()*3)
document.getElementById("contador").innerText = "+"+pessoas
},2000)

// TIMER URGÊNCIA
let tempo = 300

setInterval(()=>{

let min = Math.floor(tempo / 60)
let sec = tempo % 60

document.getElementById("timer").innerText =
"⏳ Vagas acabando em " + min + ":" + (sec<10?"0":"") + sec

tempo--

if(tempo <= 0){
tempo = 300
}

},1000)

</script>

</body>
</html>
