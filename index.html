<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gerador de Ofertas Shopee</title>

<style>

body{
background:#0a0a0a;
font-family:Arial;
color:white;
text-align:center;
padding:30px;
}

input{
width:80%;
padding:12px;
border-radius:8px;
border:none;
}

button{
padding:12px 20px;
border:none;
border-radius:8px;
margin-top:10px;
background:#00c853;
color:white;
cursor:pointer;
}

.card{
background:#1b5e20;
padding:20px;
border-radius:10px;
margin-top:20px;
text-align:left;
}

textarea{
width:100%;
height:200px;
margin-top:10px;
}

</style>

</head>

<body>

<h2>🔥 Gerador de Ofertas Shopee</h2>

<input id="link" placeholder="Cole o link da Shopee">

<br>

<button onclick="gerar()">Gerar Oferta</button>

<div class="card">

<div id="preview"></div>

<textarea id="texto"></textarea>

<button onclick="copiar()">Copiar</button>

</div>

<script>
async function gerarOferta(){

const url = document.getElementById("url").value

const res = await fetch("/oferta?url=" + encodeURIComponent(url))

const data = await res.json()

const nome = data.title || "Produto Shopee"
const preco = data.price || "Ver preço no link"
const imagem = data.image || ""

const texto =
`🛍️ ${nome}

❌ De: -
✅ Por: ${preco}

🛒✨ COMPRE AQUI
${url}

⚠️ Promoção sujeita a alteração a qualquer momento.`

document.getElementById("resultado").innerText = texto

document.getElementById("card").innerHTML = `
<h3>🛍️ ${nome}</h3>

${imagem ? `<img src="${imagem}" style="width:120px;border-radius:10px;">` : ""}

<p>❌ De: -</p>
<p>✅ Por: ${preco}</p>

<p>🛒✨ COMPRE AQUI</p>
<a href="${url}" target="_blank">${url}</a>

<p>⚠️ Promoção sujeita a alteração a qualquer momento.</p>
`

}
</script>
