<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Gerador de Ofertas Shopee</title>

<style>

body{
background:#000;
font-family:Arial;
text-align:center;
color:white;
padding:40px;
}

input{
width:80%;
padding:12px;
margin:8px;
border-radius:8px;
border:none;
}

button{
padding:12px 20px;
border:none;
border-radius:8px;
background:#00c853;
color:white;
font-size:16px;
cursor:pointer;
}

.card{
background:#1b5e20;
padding:20px;
margin-top:30px;
border-radius:10px;
}

textarea{
width:90%;
height:150px;
margin-top:15px;
}

</style>
</head>

<body>

<h2>🔥 Gerador de Ofertas Shopee</h2>

<input id="link" placeholder="Cole o link da Shopee">

<br>

<input id="precoAntigo" placeholder="Preço antigo">

<br>

<input id="precoNovo" placeholder="Preço novo">

<br><br>

<button onclick="gerar()">Gerar Oferta</button>

<div class="card">

<div id="preview"></div>

<textarea id="texto"></textarea>

<br><br>

<button onclick="copiar()">Copiar</button>

<button onclick="whatsapp()">Enviar WhatsApp</button>

</div>

<script>

async function gerar(){

const url = document.getElementById("link").value
const precoAntigo = document.getElementById("precoAntigo").value
const precoNovo = document.getElementById("precoNovo").value

if(!url){
alert("Cole o link da Shopee")
return
}

try{

// usa API de preview
const res = await fetch("https://jsonlink.io/api/extract?url="+encodeURIComponent(url))
const data = await res.json()

let nome = data.title || "Produto Shopee"

const texto = `🛍️ ${nome}

❌ De: R$ ${precoAntigo}
✅ Por: R$ ${precoNovo}

🛒✨ COMPRE AQUI
${url}

⚠️ Promoção sujeita a alteração a qualquer momento.`

document.getElementById("texto").value = texto

document.getElementById("preview").innerHTML = `
<h3>${nome}</h3>
<p>❌ De: R$ ${precoAntigo}</p>
<p>✅ Por: R$ ${precoNovo}</p>
<a href="${url}" target="_blank">🛒 Comprar</a>
`

}catch(e){

alert("Erro ao pegar produto")

}

}

</script>
