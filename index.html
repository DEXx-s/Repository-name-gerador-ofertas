<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grupo VIP</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#f5f5f5;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  width:95%;
  max-width:400px;
  background:#ffffff;
  padding:25px;
  border-radius:25px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

/* ALERTA TOPO */
.topo{
  background:#ff3b3b;
  color:#fff;
  padding:10px;
  border-radius:20px;
  font-size:13px;
  margin-bottom:15px;
  font-weight:bold;
}

/* TITULO */
h1{
  font-size:26px;
  color:#111;
  margin-bottom:10px;
}

/* TEXTO */
p{
  color:#555;
  font-size:15px;
}

.destaque{
  color:#00c853;
  font-weight:bold;
}

/* TIMER */
.timer{
  margin:10px 0;
  color:#ff9800;
  font-weight:bold;
}

/* LISTA */
.lista{
  text-align:left;
  margin:15px 0;
  font-size:14px;
  color:#333;
  line-height:1.6;
}

/* BOTÃO */
button{
  width:100%;
  padding:15px;
  border:none;
  border-radius:50px;
  background:linear-gradient(90deg,#00c853,#00ff95);
  color:#000;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
  box-shadow:0 10px 20px rgba(0,255,100,0.3);
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
}

/* IMAGEM */
.imagem{
  width:100%;
  border-radius:15px;
  margin-bottom:15px;
}

/* NOTIFICAÇÃO */
.notificacao{
  margin-top:10px;
  font-size:12px;
  color:#777;
}

/* MOBILE AJUSTE */
@media(max-width:400px){
  h1{font-size:22px;}
}
</style>
