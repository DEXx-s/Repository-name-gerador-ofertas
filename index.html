<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gerador por Imagem</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>

body{
background:#000;
color:#fff;
font-family:Arial;
text-align:center;
padding:20px;
}

.card{
background:#fff;
color:#000;
padding:20px;
border-radius:10px;
margin-top:20px;
}

button{
padding:12px 20px;
border:none;
border-radius:8px;
margin:5px;
cursor:pointer;
}

textarea{
width:100%;
height:200px;
}

</style>

</head>

<body>

<h2>🔥 Gerador de Oferta por Imagem</h2>

<input type="file" id="imagem">

<br><br>

<button onclick="lerImagem()">Ler Imagem</button>

<div class="card">

<textarea id="resultado"></textarea>

<br>

<button onclick="copiar()">Copiar</button>

</div>

<script>

async function lerImagem(){

const file = document.getElementById("imagem").files[0]

if(!file){
alert("Selecione uma imagem")
return
}

const { data } = await Tesseract.recognize(
file,
'por'
)

const texto = data.text

let preco = texto.match(/R\$ ?[0-9,.]+/)

if(preco){
preco = preco[0]
}else{
preco = "Ver preço no link"
}

const oferta = `🔥 SUPER OFERTA SHOPEE

💸 Por: ${preco}

🛒 Comprar agora 👇
(link do produto)

⚡ Promoções mudam rápido`

document.getElementById("resultado").value = oferta

}

function copiar(){

const txt = document.getElementById("resultado")

txt.select()

document.execCommand("copy")

alert("Copiado")

}

</script>

</body>
</html>
