<script>

async function gerarOferta(){

const campo = document.getElementById("link")
const links = campo.value.split("\n")

let resultado = ""

for(let link of links){

link = link.trim()

if(!link) continue

try{

const resposta = await fetch(`/oferta?url=${encodeURIComponent(link)}`)
const dados = await resposta.json()

if(dados.erro){
resultado += "Erro ao gerar oferta\n\n"
continue
}

resultado += dados.texto + "\n\n----------------------\n\n"

}catch(e){

resultado += "Erro ao conectar servidor\n\n"

}

}

document.getElementById("resultado").value = resultado

}

function copiar(){

const texto = document.getElementById("resultado")

texto.select()
texto.setSelectionRange(0,99999)

document.execCommand("copy")

alert("Oferta copiada!")

}

</script>
