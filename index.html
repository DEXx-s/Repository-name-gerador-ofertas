<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Gerador de Ofertas Shopee</title>

<style>

body{
background:#000;
color:white;
font-family:Arial;
text-align:center;
padding:40px;
}

input{
width:80%;
padding:12px;
border-radius:8px;
border:none;
font-size:16px;
}

button{
background:#00c853;
color:white;
border:none;
padding:12px 25px;
border-radius:8px;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

.card{
background:#1b5e20;
padding:20px;
margin-top:30px;
border-radius:12px;
}

textarea{
width:100%;
height:140px;
margin-top:15px;
}

</style>

</head>

<body>

<h2>🔥 Gerador de Ofertas Shopee</h2>

<input id="url" placeholder="Cole o link da Shopee">

<br>

<button onclick="gerarOferta()">Gerar Oferta</button>

<div class="card">

<div id="resultado"></div>

<textarea id="texto"></textarea>

<br>

<button onclick="copiar()">Copiar</button>

</div>

<script>

async function gerarOferta(){

const url = document.getElementById("url").value

if(!url){
alert("Cole o link da Shopee")
return
}

const api = "/oferta?url=" + encodeURIComponent(url)

const res = await fetch(api)

const data = await res.json()

const nome = data.title || "Produto Shopee"
const preco = data.price || "Ver preço no link"
const imagem = data.image || ""

document.getElementById("resultado").innerHTML = `

<h3>🛍️ ${nome}</h3>

${imagem ? `<img src="${imagem}" width="150">` : ""}

<p>❌ De: -</p>
<p>✅ Por: ${preco}</p>

<p>🛒✨ COMPRE AQUI</p>
<a href="${url}" target="_blank">${url}</a>

<p>⚠️ Promoção sujeita a alteração a qualquer momento.</p>

`

const texto = `🛍️ ${nome}

❌ De: -
✅ Por: ${preco}

🛒✨ COMPRE AQUI
${url}

⚠️ Promoção sujeita a alteração a qualquer momento.`

document.getElementById("texto").value = texto

}

function copiar(){

const t = document.getElementById("texto")

t.select()

document.execCommand("copy")

alert("Oferta copiada")

}

</script>

</body>
</html>
