<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gerador de Ofertas Shopee</title>

<style>

body{
background:#0e0e0e;
font-family:Arial;
color:white;
text-align:center;
padding:30px;
}

.container{
max-width:600px;
margin:auto;
}

input{
width:100%;
padding:15px;
font-size:16px;
border:none;
border-radius:6px;
margin-bottom:15px;
}

button{
background:#00c853;
color:white;
border:none;
padding:15px 25px;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#00b34a;
}

textarea{
width:100%;
height:200px;
margin-top:20px;
padding:15px;
border-radius:6px;
border:none;
font-size:14px;
}

img{
max-width:200px;
margin-top:15px;
border-radius:10px;
}

.copy{
margin-top:10px;
background:#2962ff;
}

</style>
</head>

<body>

<div class="container">

<h2>🔥 Gerador de Ofertas Shopee</h2>

<input id="link" placeholder="Cole o link da Shopee">

<br>

<button onclick="gerarOferta()">Gerar Oferta</button>

<br>

<img id="imagem" style="display:none">

<textarea id="link" placeholder="Cole vários links da Shopee (um por linha)"></textarea>
<br>

<button class="copy" onclick="copiar()">Copiar Oferta</button>

</div>

<script>

async function gerarOferta(){

const link = document.getElementById("link").value

if(!link){
alert("Cole o link da Shopee")
return
}

document.getElementById("resultado").value = "Gerando oferta..."

try{

const resposta = await fetch(`/oferta?url=${encodeURIComponent(link)}`)

const dados = await resposta.json()

if(dados.erro){
document.getElementById("resultado").value = dados.erro
return
}

document.getElementById("resultado").value = dados.texto

if(dados.imagem){
document.getElementById("imagem").src = dados.imagem
document.getElementById("imagem").style.display = "block"
}

}catch(e){

document.getElementById("resultado").value = "Erro ao gerar oferta"

}

}

function copiar(){

const texto = document.getElementById("resultado")

texto.select()
texto.setSelectionRange(0,99999)

document.execCommand("copy")

alert("Oferta copiada!")

}

</script>

</body>
</html>
