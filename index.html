<script>

async function gerarOferta(){

const url = document.getElementById("link").value

const res = await fetch("/oferta?url="+encodeURIComponent(url))

const data = await res.json()

if(data.erro){
alert("Erro ao gerar oferta")
return
}

const texto = `🛍️ ${data.nome}

❌ De: ${data.precoOriginal || "-"}
✅ Por: ${data.precoAtual}

🛒✨ COMPRE AQUI
${data.link}

⚠️ Promoção sujeita a alteração a qualquer momento.`

document.getElementById("resultado").value = texto

}

function copiar(){

const txt = document.getElementById("resultado")

txt.select()

document.execCommand("copy")

alert("Copiado!")

}

function whatsapp(){

const texto = encodeURIComponent(document.getElementById("resultado").value)

window.open("https://wa.me/?text="+texto)

}

</script>
