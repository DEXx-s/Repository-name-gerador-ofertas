<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grupo VIP</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:linear-gradient(180deg,#f5f5f5,#eaeaea);
}

/* CONTAINER */
.container{
  max-width:400px;
  margin:auto;
  padding:20px;
}

/* CARD */
.card{
  background:#fff;
  border-radius:30px;
  padding:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

/* TITULO */
h1{
  text-align:center;
  color:#d97706;
}

/* BOTÃO TOPO */
.vip{
  background:linear-gradient(90deg,#ffcc00,#ff9900);
  padding:12px;
  border-radius:50px;
  text-align:center;
  font-weight:bold;
  margin:15px 0;
  box-shadow:0 5px 0 #cc7a00;
}

/* BOX INFO */
.box{
  background:#f9f3e7;
  padding:15px;
  border-radius:20px;
  margin:15px 0;
  border:1px dashed #e0caa0;
  text-align:center;
}

/* LISTA */
.lista{
  background:#f4ede2;
  padding:15px;
  border-radius:20px;
  margin:15px 0;
}

/* BOTÃO */
.botao{
  background:linear-gradient(90deg,#00c853,#00ff95);
  color:#fff;
  text-align:center;
  padding:18px;
  border-radius:50px;
  font-size:18px;
  font-weight:bold;
  margin-top:15px;
  box-shadow:0 8px 0 #009624;
}

/* CONTADOR */
.contador{
  background:#fff3cd;
  border-radius:50px;
  padding:10px;
  text-align:center;
  margin-top:15px;
  border:2px solid #f0c36d;
}
</style>

</head>

<body>

<div class="container">

<div class="card">

<h1>Grupo VIP de Ofertas</h1>

<div class="vip">👑 Grupo VIP de Achadinhos</div>

<div class="box">
⚡ Acesso exclusivo às melhores promoções diretamente no seu WhatsApp!
</div>

<div class="lista">
⚡ Ofertas relâmpago em primeira mão <br><br>
🎟 Cupons de desconto exclusivos <br><br>
⏳ Promoções por tempo limitado
</div>

<div class="botao" onclick="entrar()">
📱 QUERO ENTRAR NO GRUPO VIP
</div>

<div class="contador">
👥 <b>+438</b> Pessoas já economizando!
</div>

</div>

</div>

<script>
function entrar(){
  window.location.href = "https://chat.whatsapp.com/SEULINK";
}
</script>

</body>
</html>
