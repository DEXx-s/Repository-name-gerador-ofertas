<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Gerador de Ofertas</title>

<style>

body{
background:#000;
color:white;
font-family:Arial;
text-align:center;
padding:40px;
}

input{
width:80%;
padding:12px;
border-radius:8px;
border:none;
font-size:16px;
margin:5px;
}

button{
background:#00c853;
color:white;
border:none;
padding:12px 25px;
border-radius:8px;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

.card{
background:#1b5e20;
padding:20px;
margin-top:30px;
border-radius:12px;
}

textarea{
width:100%;
height:150px;
margin-top:10px;
}

img{
max-width:120px;
margin:10px;
}

</style>

</head>

<body>

<h2>🔥 Gerador de Ofertas Shopee</h2>

<input id="link" placeholder="Cole o link da Shopee">

<br>

<input id="precoAntigo" placeholder="Preço antigo (opcional)">

<input id="precoNovo" placeholder="Preço novo">

<br>

<button onclick="gerar()">Gerar Oferta</button>

<div class="card">

<div id="preview"></div>

<textarea id="texto"></textarea>

<br>

<button onclick="copiar()">Copiar</button>

<button onclick="whatsapp()">Enviar WhatsApp</button>

</div>

<script>

async function gerar(){

const url = document.getElementById("link").value
const precoAntigo = document.getElementById("precoAntigo").value
const precoNovo = document.getElementById("precoNovo").value

if(!url){
alert("Cole o link da Shopee")
return
}

try{

const res = await fetch("https://api.microlink.io?url="+encodeURIComponent(url))
const data = await res.json()

let nome = data.data.title || "Oferta Shopee"
let imagem = data.data.image?.url || ""

let texto = `🛍️ ${nome}

❌ De: R$ ${precoAntigo || "-"}
✅ Por: R$ ${precoNovo}

🛒✨ COMPRE AQUI
${url}

⚠️ Promoção sujeita a alteração a qualquer momento.`

document.getElementById("texto").value = texto

document.getElementById("preview").innerHTML = `
<h3>${nome}</h3>
${imagem ? `<img src="${imagem}" width="120">` : ""}
<p>❌ De: R$ ${precoAntigo || "-"}</p>
<p>✅ Por: R$ ${precoNovo}</p>
<a href="${url}" target="_blank">🛒 Comprar</a>
`

}catch(e){

alert("Erro ao gerar oferta")

}

}

function copiar(){

let t = document.getElementById("texto")
t.select()
document.execCommand("copy")
alert("Oferta copiada")

}

function whatsapp(){

let texto = encodeURIComponent(document.getElementById("texto").value)

window.open("https://wa.me/?text="+texto)

}

</script>
