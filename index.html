<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Gerador Shopee PRO</title>

<style>

body{
background:#000;
color:white;
font-family:Arial;
text-align:center;
padding:30px;
}

input{
width:80%;
padding:12px;
margin:8px;
border-radius:8px;
border:none;
}

button{
background:#00c853;
border:none;
padding:12px 20px;
border-radius:8px;
color:white;
cursor:pointer;
}

.card{
background:#1b5e20;
padding:20px;
margin-top:30px;
border-radius:10px;
}

img{
max-width:200px;
margin-top:10px;
}

textarea{
width:90%;
height:160px;
margin-top:10px;
}

</style>

</head>

<body>

<h2>🔥 Gerador de Ofertas Shopee</h2>

<input id="link" placeholder="Cole o link da Shopee">

<br>

<input id="precoPromo" placeholder="Preço promocional">

<br><br>

<button onclick="gerar()">Gerar Oferta</button>

<div class="card">

<div id="preview"></div>

<textarea id="texto"></textarea>

<br><br>

<button onclick="copiar()">Copiar</button>

<button onclick="whatsapp()">Enviar WhatsApp</button>

</div>

<script>

async function gerar(){

const url = document.getElementById("link").value
const precoPromo = document.getElementById("precoPromo").value

const res = await fetch("/produto?url="+encodeURIComponent(url))
const data = await res.json()

const titulo = data.titulo || "Produto Shopee"
const precoOriginal = data.preco || ""
const img = data.imagem || ""

const texto = `🛍️ ${titulo}

💰 De: ${precoOriginal}
🔥 Por: R$ ${precoPromo}

🛒 COMPRE AQUI
${url}

⚠️ Promoção sujeita a alteração.`

document.getElementById("texto").value = texto

document.getElementById("preview").innerHTML = `
<h3>${titulo}</h3>
<img src="${img}">
<p>💰 De: ${precoOriginal}</p>
<p>🔥 Por: R$ ${precoPromo}</p>
<a href="${url}" target="_blank">🛒 Comprar</a>
`

}

function copiar(){

const t = document.getElementById("texto")

t.select()

document.execCommand("copy")

alert("Oferta copiada")

}

function whatsapp(){

const txt = encodeURIComponent(document.getElementById("texto").value)

window.open("https://wa.me/?text="+txt)

}

</script>

</body>

</html>
