<script>

async function gerarOferta(){

const url = document.getElementById("link").value

const response = await fetch("/oferta?url="+encodeURIComponent(url))

const data = await response.json()

if(data.erro){
alert("Erro ao gerar oferta")
return
}

document.getElementById("titulo").innerText = data.nome
document.getElementById("imagem").src = data.imagem
document.getElementById("precoDe").innerText = data.precoOriginal || "-"
document.getElementById("precoPor").innerText = data.precoAtual
document.getElementById("desconto").innerText = data.desconto || ""

document.getElementById("texto").value = data.texto

}

function copiar(){

const texto = document.getElementById("texto")

texto.select()

document.execCommand("copy")

alert("Oferta copiada")

}

function enviarWhats(){

const texto = encodeURIComponent(document.getElementById("texto").value)

window.open("https://wa.me/?text="+texto)

}

function enviarTelegram(){

const texto = encodeURIComponent(document.getElementById("texto").value)

window.open("https://t.me/share/url?url=&text="+texto)

}

</script>
