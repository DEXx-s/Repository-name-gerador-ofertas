<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grupo VIP</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#ffffff;
}

/* CONTAINER */
.container{
  max-width:500px;
  margin:auto;
  padding:20px;
}

/* IMAGEM */
.imagem{
  width:80px;
  height:80px;
  border-radius:50%;
  display:block;
  margin:20px auto;
}

/* ALERTA */
.topo{
  background:#ff3b3b;
  color:#fff;
  padding:12px;
  border-radius:50px;
  font-size:13px;
  margin-bottom:20px;
  text-align:center;
  font-weight:bold;
}

/* TITULO */
h1{
  text-align:center;
  font-size:26px;
  color:#111;
}

/* TEXTO */
p{
  text-align:center;
  color:#555;
}

.destaque{
  color:#00c853;
  font-weight:bold;
}

/* TIMER */
.timer{
  text-align:center;
  color:#ff9800;
  margin:10px 0;
  font-weight:bold;
}

/* LISTA */
.lista{
  margin:20px 0;
  font-size:15px;
  color:#333;
  line-height:1.7;
}

/* BOTÃO */
button{
  width:100%;
  padding:18px;
  border:none;
  border-radius:50px;
  background:linear-gradient(90deg,#00c853,#00ff95);
  color:#000;
  font-size:17px;
  font-weight:bold;
}

/* NOTIFICAÇÃO */
.notificacao{
  margin-top:12px;
  text-align:center;
  font-size:13px;
  color:#777;
}
</style>

</head>

<body>

<div class="container">

<img src="https://i.imgur.com/abc123.jpg" class="imagem">

<div class="topo">💥 ÚLTIMAS VAGAS (QUASE LOTADO)</div>

<h1>🔥 Grupo VIP de Ofertas</h1>

<p><span class="destaque">Até 80% OFF</span> direto no seu WhatsApp</p>

<div class="timer">⏳ Vagas acabando rápido</div>

<div class="lista">
⚡ Ofertas antes de todo mundo<br>
🎟 Cupons exclusivos<br>
💰 Preços absurdos<br>
🚚 Frete grátis<br>
🔥 Produtos virais
</div>

<button onclick="entrar()">🚀 GARANTIR MINHA VAGA</button>

<div class="notificacao">🟢 João acabou de entrar</div>

</div>

<script>
function entrar(){
  window.location.href = "https://chat.whatsapp.com/SEULINK";
}
</script>

</body>
</html>
