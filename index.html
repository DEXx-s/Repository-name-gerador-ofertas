<script>
function entrarGrupo(){

  const nome = document.querySelector('input[placeholder="Digite seu nome"]').value
  const numero = document.querySelector('input[placeholder="Seu WhatsApp"]').value

  if(!nome || !numero){
    alert("Preencha os dados")
    return
  }

  const grupo = "https://chat.whatsapp.com/SEU-LINK-AQUI"

  // mensagem automática
  const msg = `Olá! Meu nome é ${nome} e quero entrar no grupo VIP 🔥`

  const url = `https://wa.me/?text=${encodeURIComponent(msg)}`

  // abre whatsapp + grupo
  window.open(url, "_blank")

  setTimeout(()=>{
    window.location.href = grupo
  }, 1500)
}
<script>
let tempo = 180

setInterval(()=>{
  tempo--

  let min = Math.floor(tempo/60)
  let sec = tempo % 60

  document.querySelector("#timer").innerText = `${min}:${sec < 10 ? "0"+sec : sec}`

  if(tempo <= 0){
    tempo = 180
  }

},1000)
</script>

<span id="timer">3:00</span>

<script>
const nomes = ["Maria","João","Carlos","Ana","Lucas","Fernanda","Pedro"]

setInterval(()=>{
  const nome = nomes[Math.floor(Math.random()*nomes.length)]
  document.querySelector("#notificacao").innerText = `${nome} acabou de entrar no grupo`
},3000)
</script>
