<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gerador de Ofertas Shopee</title>

<style>

body{
background:#000;
color:#fff;
font-family:Arial;
text-align:center;
padding:20px;
}

input{
width:90%;
padding:12px;
font-size:16px;
border-radius:8px;
border:none;
margin-bottom:10px;
}

button{
padding:12px 20px;
border:none;
border-radius:8px;
font-size:16px;
margin:5px;
cursor:pointer;
}

.btn-gerar{background:#00c853;color:#fff;}
.btn-copiar{background:#2979ff;color:#fff;}
.btn-wpp{background:#25d366;color:#fff;}
.btn-tg{background:#0088cc;color:#fff;}

.card{
background:#fff;
color:#000;
padding:20px;
border-radius:10px;
margin-top:20px;
}

img{
max-width:200px;
margin:10px;
}

textarea{
width:100%;
height:180px;
margin-top:10px;
}

</style>

</head>

<body>

<h2>🔥 Gerador de Ofertas Shopee</h2>

<input id="link" placeholder="Cole o link da Shopee">

<br>

<button class="btn-gerar" onclick="gerar()">Gerar Oferta</button>

<div class="card">

<h3 id="titulo"></h3>

<img id="imagem">

<p>
💰 De: <span id="de"></span><br>
💸 Por: <span id="por"></span><br>
🔥 <span id="off"></span>
</p>

<textarea id="texto"></textarea>

<br>

<button class="btn-copiar" onclick="copiar()">Copiar</button>

<button class="btn-wpp" onclick="whats()">WhatsApp</button>

<button class="btn-tg" onclick="telegram()">Telegram</button>

</div>

<script>

async function gerar(){

const url = document.getElementById("link").value

const r = await fetch("/oferta?url="+encodeURIComponent(url))

const data = await r.json()

if(data.erro){
alert("Erro ao gerar oferta")
return
}

document.getElementById("titulo").innerText=data.nome
document.getElementById("imagem").src=data.imagem
document.getElementById("de").innerText=data.precoOriginal || "-"
document.getElementById("por").innerText=data.precoAtual
document.getElementById("off").innerText=data.desconto

document.getElementById("texto").value=data.texto

}

function copiar(){

const t=document.getElementById("texto")

t.select()

document.execCommand("copy")

alert("Copiado")

}

function whats(){

const texto=encodeURIComponent(document.getElementById("texto").value)

window.open("https://wa.me/?text="+texto)

}

function telegram(){

const texto=encodeURIComponent(document.getElementById("texto").value)

window.open("https://t.me/share/url?url=&text="+texto)

}

</script>

</body>
</html>
